[build]
  publish = "dist"
  command = "npm run build"

# Entêtes par défaut pour tout le site
[[headers]]
  for = "/*"
  [headers.values]
    # --- Entêtes de sécurité ---
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'"
    
    # --- Cache pour les fichiers modifiables (index.html) ---
    # Ne jamais mettre en cache l'index.html pour s'assurer que les utilisateurs ont toujours la dernière version de l'app
    Cache-Control = "public, max-age=0, must-revalidate"

# Entêtes spécifiques pour le cache des assets générés par Vite (JS/CSS/Images)
# Ces fichiers ont un "hash" unique dans leur nom, on peut donc les mettre en cache très longtemps
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
